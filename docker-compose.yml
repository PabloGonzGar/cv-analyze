services:

  # ── Ollama ─────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cvranker-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cvranker-backend
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - uploads_data:/app/uploads
      - results_data:/app/results
      - auth_data:/app/data        # ← BD SQLite de usuarios
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cvranker-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Descarga del modelo (se ejecuta una sola vez) ──────────────────────────
  model-puller:
    image: ollama/ollama:latest
    container_name: cvranker-model-puller
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "llama3"]
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  ollama_data:
  uploads_data:
  results_data:
  auth_data:       # ← persiste auth.db entre reinicios del contenedor