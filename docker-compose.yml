version: "3.9"

services:

  # ── Ollama: motor de LLM local ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cvranker-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama   # modelos persistentes entre reinicios
    # Para usar GPU NVIDIA, descomenta las líneas siguientes:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Backend: FastAPI ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cvranker-backend
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=http://ollama:11434   # apunta al servicio ollama interno
    volumes:
      - uploads_data:/app/uploads         # ZIPs recibidos
      - results_data:/app/results         # JSONs de resultados
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Frontend: Nginx ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cvranker-frontend
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP público
      # - "443:443"   # HTTPS (actívalo cuando añadas certificado)
    depends_on:
      - backend

  # ── Modelo: descarga llama3 al arrancar ───────────────────────────────────
  # Este servicio se ejecuta una sola vez y termina.
  # Si ya tienes el modelo descargado, puedes comentar este bloque.
  model-puller:
    image: ollama/ollama:latest
    container_name: cvranker-model-puller
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "llama3"]
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  ollama_data:    # modelos de Ollama (~4 GB para llama3)
  uploads_data:   # ZIPs subidos
  results_data:   # JSONs de resultados