server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Forzar charset UTF-8 en todos los tipos texto
    charset utf-8;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # CSS — MIME forzado, sin nosniff que lo bloquee
    location ~* \.css$ {
        types { text/css css ; }
        add_header Cache-Control "public, max-age=3600";
    }

    # JS — MIME forzado
    location ~* \.js$ {
        types { application/javascript js; }
        add_header Cache-Control "public, max-age=3600";
    }

    # Proxy al backend — resolver lazy con variable para evitar
    # "host not found" cuando nginx arranca antes que el backend
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
        proxy_read_timeout   300s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    server_tokens off;
}