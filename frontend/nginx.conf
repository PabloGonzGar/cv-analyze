# ══════════════════════════════════════════════════════════════
# Nginx — CV Ranker (producción)
# Rate limiting en /api/login para evitar fuerza bruta
# ══════════════════════════════════════════════════════════════

# Zona de rate limit: máx 10 requests/minuto por IP en el login
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # CSS
    location ~* \.css$ {
        types { text/css css; }
        add_header Cache-Control "public, max-age=3600";
    }

    # JS
    location ~* \.js$ {
        types { application/javascript js; }
        add_header Cache-Control "public, max-age=3600";
    }

    # Login — rate limiting para prevenir fuerza bruta
    location = /api/login {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;

        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 1M;
    }

    # Resto de API
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    server_tokens off;
}