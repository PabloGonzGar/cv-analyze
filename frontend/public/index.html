<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Talent AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Karla:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-mark">Talent AI</div>
      <div class="logo-sub">Portal de selección</div>
    </div>
    <div class="nav-item active" data-view="upload" onclick="nav('upload')">
      <span class="nav-icon">⊕</span> Nuevo análisis
    </div>
    <div class="nav-item" data-view="history" onclick="nav('history')">
      <span class="nav-icon">◫</span> Historial
      <span class="nav-badge" id="hist-badge"></span>
    </div>
    <div class="sidebar-bottom">
      <div class="theme-row">
        <span class="theme-lbl" id="theme-lbl">Modo oscuro</span>
        <div class="sw on" id="theme-sw" onclick="toggleTheme()">
          <div class="sw-thumb"></div>
        </div>
      </div>
    </div>
  </nav>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="page-title" id="page-title">Nuevo análisis</div>
    <span class="status-badge" id="status-badge">LISTO</span>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <!-- UPLOAD -->
    <div class="view active" id="view-upload">
      <div class="upload-grid">
        <div class="card">
          <div class="card-title">Oferta de trabajo</div>
          <div class="field-label">Descripción del puesto</div>
          <textarea class="field" id="oferta-input" rows="7"
            placeholder="Describe el rol, experiencia requerida, habilidades clave, condiciones…"></textarea>
        </div>
        <div class="card">
          <div class="card-title">Candidatos</div>
          <div class="field-label">ZIP con CVs (PDF, DOCX, TXT)</div>
          <div class="drop-zone" id="drop-zone">
            <input type="file" id="file-input" accept=".zip"/>
            <div class="drop-icon">⬡</div>
            <div class="drop-hint">Arrastra el <strong>.zip</strong> aquí<br>o haz clic para seleccionar</div>
            <div class="drop-fname" id="drop-fname"></div>
          </div>
          <button class="btn btn-primary btn-full" id="btn-submit" style="margin-top:16px" disabled>
            Iniciar análisis →
          </button>
        </div>
      </div>
      <div class="card progress-card" id="prog-card" style="display:none">
        <div class="prog-top">
          <span class="prog-lbl">Analizando candidatos…</span>
          <span class="prog-val" id="prog-val">0 / 0</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="view" id="view-history">
      <div id="hist-content"></div>
    </div>

    <!-- RESULTS -->
    <div class="view" id="view-results">
      <div style="margin-bottom:22px">
        <button class="btn btn-ghost" onclick="nav('history')">← Historial</button>
      </div>
      <div id="results-content"></div>
    </div>

  </main>
</div>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div id="drawer-content"></div>
</div>

<!-- TOOLTIP / TOAST -->
<div id="g-tip"></div>
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
